<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PolySignal BTC{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0e14;
            --bg-card: #111820;
            --bg-card-hover: #1a2332;
            --accent-cyan: #00d4ff;
            --accent-violet: #8b5cf6;
            --accent-gold: #f59e0b;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --border-color: #1e293b;
            --glow-cyan: 0 0 20px rgba(0, 212, 255, 0.3);
            --glow-violet: 0 0 20px rgba(139, 92, 246, 0.3);
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
        }
        
        .mono {
            font-family: 'JetBrains Mono', monospace;
        }
        
        .navbar {
            background: linear-gradient(180deg, rgba(17, 24, 32, 0.95) 0%, rgba(10, 14, 20, 0.98) 100%);
            border-bottom: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
        }
        
        .navbar-brand {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 1.25rem;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-violet));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .nav-link {
            color: var(--text-secondary);
            font-weight: 500;
            transition: all 0.2s;
            padding: 0.5rem 1rem;
            border-radius: 8px;
        }
        
        .nav-link:hover, .nav-link.active {
            color: var(--accent-cyan);
            background: rgba(0, 212, 255, 0.1);
        }
        
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            transition: all 0.3s ease;
        }
        
        .card:hover {
            border-color: rgba(0, 212, 255, 0.3);
            box-shadow: var(--glow-cyan);
        }
        
        .card-header {
            background: transparent;
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 1.25rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
        }
        
        .card-body {
            padding: 1.25rem;
        }
        
        .signal-up {
            color: var(--accent-green);
            text-shadow: 0 0 10px rgba(16, 185, 129, 0.5);
        }
        
        .signal-down {
            color: var(--accent-red);
            text-shadow: 0 0 10px rgba(239, 68, 68, 0.5);
        }
        
        .signal-none {
            color: var(--text-secondary);
        }
        
        .confidence-ring {
            position: relative;
            width: 120px;
            height: 120px;
        }
        
        .confidence-ring svg {
            transform: rotate(-90deg);
        }
        
        .confidence-value {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'JetBrains Mono', monospace;
            font-size: 2rem;
            font-weight: 700;
        }
        
        .tier-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .tier-elite { background: linear-gradient(135deg, #f59e0b, #ef4444); color: white; }
        .tier-strong { background: var(--accent-cyan); color: var(--bg-dark); }
        .tier-moderate { background: var(--accent-violet); color: white; }
        .tier-weak { background: var(--text-secondary); color: var(--bg-dark); }
        
        .regime-badge {
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .regime-trending { background: rgba(16, 185, 129, 0.2); color: var(--accent-green); }
        .regime-sideways { background: rgba(148, 163, 184, 0.2); color: var(--text-secondary); }
        .regime-breakout { background: rgba(139, 92, 246, 0.2); color: var(--accent-violet); }
        .regime-whipsaw { background: rgba(239, 68, 68, 0.2); color: var(--accent-red); }
        
        .stat-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.5rem;
            font-weight: 700;
        }
        
        .stat-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        .countdown {
            font-family: 'JetBrains Mono', monospace;
            font-size: 2.5rem;
            font-weight: 700;
            text-align: center;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-violet));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .table {
            color: var(--text-primary);
        }
        
        .table thead th {
            background: var(--bg-dark);
            border-color: var(--border-color);
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 1rem;
        }
        
        .table td {
            border-color: var(--border-color);
            padding: 0.75rem 1rem;
            vertical-align: middle;
        }
        
        .table tbody tr {
            transition: background 0.2s;
        }
        
        .table tbody tr:hover {
            background: rgba(0, 212, 255, 0.05);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-violet));
            border: none;
            padding: 0.75rem 1.5rem;
            font-weight: 600;
            border-radius: 8px;
            transition: all 0.3s;
        }
        
        .btn-primary:hover {
            box-shadow: var(--glow-cyan);
            transform: translateY(-2px);
        }
        
        .btn-outline {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            transition: all 0.2s;
        }
        
        .btn-outline:hover {
            border-color: var(--accent-cyan);
            color: var(--accent-cyan);
        }
        
        .form-control, .form-select {
            background: var(--bg-dark);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-radius: 8px;
            padding: 0.75rem 1rem;
        }
        
        .form-control:focus, .form-select:focus {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
        }
        
        .form-label {
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.875rem;
        }
        
        .alert-info {
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.3);
            color: var(--accent-cyan);
        }
        
        .alert-warning {
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.3);
            color: var(--accent-gold);
        }
        
        .progress {
            background: var(--bg-dark);
            border-radius: 10px;
            height: 8px;
        }
        
        .progress-bar {
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-violet));
            border-radius: 10px;
        }
        
        .footer {
            background: var(--bg-card);
            border-top: 1px solid var(--border-color);
            padding: 1.5rem 0;
            margin-top: 3rem;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .live-indicator {
            animation: pulse 2s infinite;
        }
        
        @keyframes glow {
            0%, 100% { box-shadow: 0 0 5px rgba(0, 212, 255, 0.3); }
            50% { box-shadow: 0 0 20px rgba(0, 212, 255, 0.6); }
        }
        
        .live-glow {
            animation: glow 2s infinite;
        }
        
        /* Live Signal Badge */
        .signal-pulse {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--accent-green);
            animation: signal-pulse-anim 1.5s ease-in-out infinite;
        }
        
        @keyframes signal-pulse-anim {
            0%, 100% { 
                transform: scale(1);
                opacity: 1;
            }
            50% { 
                transform: scale(1.3);
                opacity: 0.7;
            }
        }
        
        /* Mobile Optimizations */
        @media (max-width: 768px) {
            .navbar-brand {
                font-size: 1rem;
            }
            
            .card {
                margin-bottom: 1rem;
            }
            
            .countdown {
                font-size: 2rem;
            }
            
            .stat-value {
                font-size: 1.25rem;
            }
            
            .confidence-ring {
                width: 100px;
                height: 100px;
            }
            
            .confidence-ring svg {
                width: 100px;
                height: 100px;
            }
            
            .confidence-value {
                font-size: 1.5rem;
            }
            
            .table {
                font-size: 0.8rem;
            }
            
            .btn-export {
                width: 100%;
                margin-bottom: 0.5rem;
            }
        }
        
        /* Confidence Gauge */
        .confidence-gauge {
            position: relative;
            width: 140px;
            height: 140px;
            margin: 0 auto;
        }
        
        .gauge-bg {
            fill: none;
            stroke: var(--bg-dark);
            stroke-width: 12;
        }
        
        .gauge-fill {
            fill: none;
            stroke-width: 12;
            stroke-linecap: round;
            transform: rotate(-90deg);
            transform-origin: center;
            transition: stroke-dasharray 0.5s ease;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="bi bi-graph-up-arrow me-2"></i>PolySignal BTC
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'dashboard.index' %}active{% endif %}" href="/">
                            <i class="bi bi-speedometer2 me-1"></i>Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'dashboard.history' %}active{% endif %}" href="/history">
                            <i class="bi bi-clock-history me-1"></i>History
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'dashboard.analytics' %}active{% endif %}" href="/analytics">
                            <i class="bi bi-bar-chart-line me-1"></i>Analytics
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'dashboard.settings' %}active{% endif %}" href="/settings">
                            <i class="bi bi-gear me-1"></i>Settings
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="py-4">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-6">
                    <span class="text-secondary">PolySignal BTC - Polymarket BTC 5-Minute Market Intelligence</span>
                </div>
                <div class="col-md-6 text-md-end">
                    <span class="text-secondary mono" id="footer-time"></span>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts@3.44.0/dist/apexcharts.min.js"></script>
    <script>
        function updateFooterTime() {
            const now = new Date();
            document.getElementById('footer-time').textContent = now.toISOString().replace('T', ' ').substring(0, 19) + ' UTC';
        }
        updateFooterTime();
        setInterval(updateFooterTime, 1000);
        
        {% block extra_js %}{% endblock %}
    </script>
</body>
</html>
